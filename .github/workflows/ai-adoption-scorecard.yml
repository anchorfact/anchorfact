name: AI Adoption Scorecard

on:
  workflow_dispatch:
  schedule:
    - cron: '47 1 * * *'

permissions:
  contents: read

concurrency:
  group: ai-adoption-scorecard
  cancel-in-progress: false

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI adoption scorecard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p reports
          npm run usage:adoption -- --lookback-minutes 1430 --write reports/ai-adoption-scorecard.md --write-json reports/ai-adoption-scorecard.json

      - name: Run AI route reliability alert
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm run usage:adoption -- --lookback-minutes 120 --write reports/ai-adoption-reliability.md --write-json reports/ai-adoption-reliability.json --fail-on-reliability-break

      - name: Upload AI adoption scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-adoption-scorecard
          path: reports/ai-adoption-*
          if-no-files-found: warn
          retention-days: 14
