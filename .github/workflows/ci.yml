name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install MCP Python dependencies
        run: python -m pip install -r src/requirements-mcp.txt

      - name: Run tests
        run: npm test

      - name: Build Pages output
        run: npm run pages:build

      - name: Run full public audit gate
        run: npm run audit-public-full
