name: Content Quality Check

on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.md'
      - 'scripts/validate-content.cjs'
  pull_request:
    branches: [main]
    paths:
      - 'content/**/*.md'
      - 'scripts/validate-content.cjs'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  validate-content:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Frontmatter & Structure
        run: node scripts/validate-content.cjs

  validate-golden-seed:
    name: Validate Golden Seeds (Strict)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: content/**/*.md

      - name: Check golden seed rules for changed files
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          echo "Changed files: ${{ steps.changed.outputs.all_changed_files }}"
          # Run strict validation — but just warn (don't block merge)
          node scripts/validate-content.cjs --strict || echo "Golden seed rules not met (warning only)"

  check-urls:
    name: Check Source URLs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check URL Reachability
        run: node scripts/check-urls.cjs
        continue-on-error: true  # Don't block on transient network issues

  quality-score:
    name: Quality Scoring (0-100)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install js-yaml
        run: npm install --no-save js-yaml

      - name: Compute quality scores
        run: node scripts/quality-score.cjs --json > quality-report.json

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.json

      - name: Quality gate (avg ≥ 60)
        run: |
          AVG=$(node -e "const r=require('./quality-report.json');console.log(Math.round(r.average_score))")
          echo "Average quality score: $AVG/100"
          if [ "$AVG" -lt 60 ]; then
            echo "::warning::Quality score below threshold ($AVG/100 < 60)"
          fi
