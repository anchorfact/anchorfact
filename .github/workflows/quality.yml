name: Quality Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Verify sources (incremental)
        run: npm run verify
        continue-on-error: true  # 网络波动不阻塞

      - name: Build to check compilation
        run: npm run build

      - name: Show summary
        run: |
          echo "=== Confidence Distribution ==="
          node -e "const m=require('./dist/manifest.json');console.log('Articles:',m.articles);console.log('High:',m.confidence_distribution.high);console.log('Medium:',m.confidence_distribution.medium);console.log('Low:',m.confidence_distribution.low)"
        continue-on-error: true
