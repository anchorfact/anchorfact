name: Content Quality Check

on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.md'
      - 'scripts/validate-content.cjs'
  pull_request:
    branches: [main]
    paths:
      - 'content/**/*.md'
      - 'scripts/validate-content.cjs'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  validate-content:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Frontmatter & Structure
        run: node scripts/validate-content.cjs

  validate-golden-seed:
    name: Validate Golden Seeds (Strict)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: content/**/*.md

      - name: Check golden seed rules for changed files
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          echo "Changed files: ${{ steps.changed.outputs.all_changed_files }}"
          # Run strict validation — but just warn (don't block merge)
          node scripts/validate-content.cjs --strict || echo "Golden seed rules not met (warning only)"

  check-urls:
    name: Check Source URLs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check URL Reachability
        run: node scripts/check-urls.cjs
        continue-on-error: true  # Don't block on transient network issues

  quality-score:
    name: Quality Scoring (0-100)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install js-yaml
        run: npm ci

      - name: Compute quality scores
        id: score
        run: |
          node scripts/quality-score.cjs --json > quality-report.json
          AVG=$(node -e "const r=require('./quality-report.json');console.log(Math.round(r.average_score))")
          echo "score=$AVG" >> $GITHUB_OUTPUT
          echo "Average quality score: $AVG/100"

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.json

      - name: Quality gate (avg ≥ 75)
        run: |
          if [ "${{ steps.score.outputs.score }}" -lt 75 ]; then
            echo "::error::Quality score below threshold (${{ steps.score.outputs.score }}/100 < 75)"
            exit 1
          fi

  quality-baseline-check:
    name: PR Quality Regression Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: quality-score
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: baseline

      - name: Setup Node.js (baseline)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Compute baseline score
        id: baseline
        working-directory: baseline
        run: |
          npm ci
          node scripts/quality-score.cjs --json > baseline-report.json
          BL=$(node -e "const r=require('./baseline-report.json');console.log(Math.round(r.average_score))")
          echo "score=$BL" >> $GITHUB_OUTPUT
          echo "Baseline score (main): $BL/100"

      - name: PR regression gate (drop ≥ 3 blocks)
        run: |
          PR_SCORE=${{ needs.quality-score.outputs.score }}
          BL_SCORE=${{ steps.baseline.outputs.score }}
          DROP=$((BL_SCORE - PR_SCORE))
          echo "PR score: $PR_SCORE | Baseline: $BL_SCORE | Drop: $DROP"
          if [ "$DROP" -ge 3 ]; then
            echo "::error::Quality regression detected: score dropped by $DROP points (≥3)"
            exit 1
          fi
          echo "Quality check passed (drop $DROP < 3)"
