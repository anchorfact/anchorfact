name: 内容提案
description: 提议新增知识条目或扩展现有条目
title: "[提案] "
labels: ["提案"]
body:
  - type: dropdown
    attributes:
      label: 提案类型
      options:
        - 新增条目
        - 扩展现有条目
        - 翻译为其他语言
    validations:
      required: true
  - type: input
    attributes:
      label: 主题
      placeholder: 例如：Attention 机制的数学推导
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 所属领域
      options:
        - ai
        - arts
        - business
        - computer-science
        - game-development
        - geography
        - health
        - history
        - science
        - self-improvement
        - sports
        - 新领域（请在正文中说明）
    validations:
      required: true
  - type: textarea
    attributes:
      label: 内容大纲
      description: 简要描述要覆盖的知识点，以及是否有可用的原始来源
  - type: textarea
    attributes:
      label: 参考文献
      description: 列出主要的可验证来源（论文 DOI、书籍 ISBN、权威网站 URL 等）