name: 内容错误报告
description: 报告文章中的事实错误、置信度问题或来源缺失
title: "[勘误] 文章ID - 错误简述"
labels: ["勘误"]
body:
  - type: input
    attributes:
      label: 文章 ID 或链接
      description: 如 kb-2026-00001 或 https://anchorfact.org/kb-2026-00001/index.md
      placeholder: kb-2026-00001
    validations:
      required: true
  - type: textarea
    attributes:
      label: 错误描述
      description: 请明确指出哪句话或哪个事实有问题，引用原文
    validations:
      required: true
  - type: textarea
    attributes:
      label: 正确信息与可验证来源
      description: 提供正确的信息和来源（DOI、arXiv ID、URL、书籍页码等）
      placeholder: |
        正确信息：...
        来源：
        - https://arxiv.org/abs/...
        - 书名，ISBN，第X页
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 影响范围
      options:
        - 原子事实（单个陈述）
        - 段落
        - 整篇文章
        - 多篇文章（请列出所有受影响的 ID）