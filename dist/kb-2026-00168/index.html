## TL;DR<br>
<br>
HTML5 (2014) introduced semantic elements that describe their meaning to both browser and developer: `<header>`, `<nav>`, `<main>`, `<article>`, `<section>`, `<aside>`, `<footer>`, `<figure>`, `<time>`. They improve accessibility (screen readers), SEO, and code readability.<br>
<br>
## Core Explanation<br>
<br>
`<main>` should be used once per page (dominant content). `<article>` for self-contained, independently distributable content. `<section>` for thematic grouping with a heading. `<aside>` for tangentially related content. Semantic HTML provides implicit ARIA roles — `<nav>` = role='navigation', `<main>` = role='main'. Always prefer semantic elements over `<div>`.<br>
